  <g id="footer">
    <text class="note" x="56" y="716">해석 포인트: SCFI는 변동성이 크고 급등·급락이 두드러지며, CCFI는 더 완만한 구조를 보입니다. 2026-03-27 CCFI 급등치는 데이터 점검 필요성이 있는 이상치 후보로 시각적으로도 구분됩니다.</text>
